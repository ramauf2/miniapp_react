<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- Viewport settings: disable zoom and make fullscreen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- iOS specific meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Prevent text size adjustment -->
    <meta name="format-detection" content="telephone=no" />
    <title>bazar-app</title>
      <script src="http://localhost/scripts/tonconnect-ui.min.js"></script>
      <script src="http://localhost/scripts/tonweb.js"></script>
      <script src="http://localhost/scripts/telegram-web-app.js"></script>
      <script>
        // Initialize Telegram WebApp and expand to fullscreen
        if (window.Telegram && window.Telegram.WebApp) {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();
          window.Telegram.WebApp.enableClosingConfirmation();
          // Lock orientation if needed
          if (window.Telegram.WebApp.isVerticalSwipesEnabled !== undefined) {
            window.Telegram.WebApp.disableVerticalSwipes();
          }
        }
      </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
